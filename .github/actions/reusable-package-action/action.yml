# .github/actions/reusable-package-action/action.yml
name: "Build package and upload"

description: "Builds rpm/deb package and upload."

inputs:
  pgver:
    description: "The PostgreSQL major version with the \"pg\" prefix (e.g. `pg14`,
      `pg16`, etc.)"
    required: true
  tag:
    description: "The tag version"
    required: true
  arch:
    description: "Target architecture (amd64 or arm64)"
    required: false
    default: amd64
  pkgtype:
    description: "Package type to build (rpm or deb)"
    required: true
    default: deb

runs:
  using: "composite"
  steps:
    - name: Setup workspace for postgres user
      run: |
        chown -R postgres:postgres $GITHUB_WORKSPACE
        chmod -R 755 $GITHUB_WORKSPACE
      shell: bash

    - name: Extract version from Cargo.toml
      id: get-version
      run: |
        # VERSION=$(grep '^version = ' Cargo.toml | awk -F'"' '{print $2}')
        VERSION=${{ inputs.tag }}
        echo "Version: $VERSION"
        echo "PGLINTER_MINOR_VERSION=$VERSION" >> $GITHUB_ENV
        echo "PACKAGE_ARCH=${{ inputs.arch }}" >> $GITHUB_ENV

        # Set architecture-specific names for artifacts
        case "${{ inputs.arch }}" in
          amd64)
            echo "RPM_ARCH=x86_64" >> $GITHUB_ENV
            echo "DEB_ARCH=amd64" >> $GITHUB_ENV
            echo "PACKAGE_PROFILE=release" >> $GITHUB_ENV
            echo "PGRX_PACKAGE_FLAGS=" >> $GITHUB_ENV
            ;;
          arm64)
            echo "RPM_ARCH=aarch64" >> $GITHUB_ENV
            echo "DEB_ARCH=arm64" >> $GITHUB_ENV
            echo "PACKAGE_PROFILE=release-lto-off" >> $GITHUB_ENV
            echo "PGRX_PACKAGE_FLAGS=--profile release-lto-off" >> $GITHUB_ENV
            ;;
          *)
            echo "RPM_ARCH=${{ inputs.arch }}" >> $GITHUB_ENV
            echo "DEB_ARCH=${{ inputs.arch }}" >> $GITHUB_ENV
            echo "PACKAGE_PROFILE=release" >> $GITHUB_ENV
            echo "PGRX_PACKAGE_FLAGS=" >> $GITHUB_ENV
            ;;
        esac
        echo "PG_VERSION=$(echo '${{ inputs.pgver }}' | sed 's/^pg//')" >> $GITHUB_ENV
      shell: bash

    - name: Ensure matching cargo-pgrx version
      run: |
        set -euo pipefail
        PGRX_VERSION="$(sed -nE 's/^pgrx = "([^"]+)"/\1/p' "$GITHUB_WORKSPACE/Cargo.toml" | head -n1)"
        if [ -z "$PGRX_VERSION" ]; then
          echo "Could not determine pgrx version from Cargo.toml"
          exit 1
        fi

        su - postgres -c "PGRX_VERSION='$PGRX_VERSION' bash -lc '
          set -euo pipefail
          installed_version=\$(cargo pgrx --version 2>/dev/null | grep -Eo \"[0-9]+\\.[0-9]+\\.[0-9]+\" | head -n1 || true)
          if [ \"\$installed_version\" != \"\$PGRX_VERSION\" ]; then
            cargo install --locked --version \"\$PGRX_VERSION\" cargo-pgrx
          fi
          if [ ! -f \"\$HOME/.pgrx/config.toml\" ]; then
            cargo pgrx init
          fi
          cargo pgrx --version
        '"
      shell: bash

    - name: Build selected package
      run: |
        export PACKAGE_ARCH=${{ inputs.arch }}
        export BUILD_ENV="PGVER=${{ inputs.pgver }} TARGET=${{ env.PACKAGE_PROFILE }} PGRX_PACKAGE_FLAGS='${{ env.PGRX_PACKAGE_FLAGS }}'"
        if [ "${{ inputs.arch }}" = "arm64" ]; then
          echo "Using arm64 packaging workaround: TARGET=${{ env.PACKAGE_PROFILE }} PGRX_PACKAGE_FLAGS=${{ env.PGRX_PACKAGE_FLAGS }}"
        fi

        if [ "${{ inputs.pkgtype }}" = "deb" ]; then
          su - postgres -c "cd $GITHUB_WORKSPACE && $BUILD_ENV PACKAGE_ARCH=${{ env.DEB_ARCH }} make deb"
        elif [ "${{ inputs.pkgtype }}" = "rpm" ]; then
          su - postgres -c "cd $GITHUB_WORKSPACE && $BUILD_ENV PACKAGE_ARCH=${{ env.RPM_ARCH }} make rpm"
        else
          echo "Unknown package type: ${{ inputs.pkgtype }}"
          exit 1
        fi
      shell: bash

    - name: "RPM package for ${{ inputs.pgver }} (${{ inputs.arch }})"
      if: ${{ inputs.pkgtype == 'rpm' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: postgresql_pglinter_${{env.PG_VERSION}}-${{env.PGLINTER_MINOR_VERSION}}-1.${{ env.RPM_ARCH}}.rpm
        path: target/${{ env.PACKAGE_PROFILE }}/pglinter-${{ inputs.pgver }}/*.rpm

    - name: "DEB package for ${{ inputs.pgver }} (${{ inputs.arch }})"
      if: ${{ inputs.pkgtype == 'deb' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: postgresql_pglinter_${{env.PG_VERSION}}-${{env.PGLINTER_MINOR_VERSION}}_${{ env.DEB_ARCH}}.deb
        path: target/${{ env.PACKAGE_PROFILE }}/pglinter-${{ inputs.pgver }}/*.deb

# .github/actions/reusable-package-action/action.yml
name: 'Build package and upload'

description: 'Builds rpm/deb package and upload.'

inputs:
  pgver:
    description: 'The PostgreSQL major version with the "pg" prefix (e.g. `pg13`, `pg16`, etc.)'
    required: true
  tag:
    description: "The tag version"
    required: true
  arch:
    description: 'Architecture (amd64 or arm64)'
    required: false
    default: 'amd64'

runs:
  using: "composite"
  steps:

    - name: Setup workspace for postgres user
      run: |
        chown -R postgres:postgres $GITHUB_WORKSPACE
        chmod -R 755 $GITHUB_WORKSPACE
      shell: bash

    - name: Setup workspace permissions (Native runner - ARM64)
      if: inputs.arch == 'arm64'
      run: |
        # Only change permissions, not ownership on native runners
        chmod -R 755 $GITHUB_WORKSPACE
        # Ensure cargo cache is accessible
        mkdir -p $HOME/.cargo
        chmod -R 755 $HOME/.cargo
      shell: bash

    - name: Extract version from Cargo.toml
      id: get-version
      run: |
        VERSION=$(grep '^version = ' Cargo.toml | awk -F'"' '{print $2}')
        echo "Extracted version: $VERSION"
        echo "PGLINTER_MINOR_VERSION=$VERSION" >> $GITHUB_ENV
      shell: bash

    - name: Build packages (Container - AMD64)
      run: |
        su - postgres -c "cd $GITHUB_WORKSPACE && PGVER=${{ inputs.pgver }} make deb"
        su - postgres -c "cd $GITHUB_WORKSPACE && PGVER=${{ inputs.pgver }} make rpm"
      shell: bash

    - name: Build packages (Native runner - ARM64)
      if: inputs.arch == 'arm64'
      run: |
        PGVER=${{ inputs.pgver }} make deb
        PGVER=${{ inputs.pgver }} make rpm
      shell: bash

    - name: 'RPM package for $[[ inputs.pgver ]] (x64_64)'
      uses: actions/upload-artifact@v4
      with:
        name: pglinter-${{ inputs.pgver }}-${{ env.PGLINTER_MINOR_VERSION }}.rpm
        path: target/release/pglinter-${{ inputs.pgver }}/*.rpm

    - name: 'DEB package for $[[ inputs.pgver ]] (amd-64)'
      uses: actions/upload-artifact@v4
      with:
        name: pglinter-${{ inputs.pgver }}-${{ env.PGLINTER_MINOR_VERSION }}.deb
        path: target/release/pglinter-${{ inputs.pgver }}/*.deb

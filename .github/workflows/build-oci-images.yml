name: Build-Test-Push OCI Images

on:
  workflow_dispatch:
    inputs:
      pgversions:
        description: "PostgreSQL versions to build (comma-separated: pg18)"
        required: false
        default: "pg18,pg17,pg16,pg15,pg14"
        type: string
  workflow_run:
    workflows: ["Package and deploy pglinter."]
    types:
      - completed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    outputs:
      pgversions: ${{ steps.matrix.outputs.pgversions }}
      runs_on: ${{ steps.matrix.outputs.runs_on }}
      arch: ${{ steps.matrix.outputs.arch }}
      pkgtype: ${{ steps.matrix.outputs.pkgtype }}
      matrix_include: ${{ steps.matrix.outputs.matrix_include }}
      test_matrix_include: ${{ steps.matrix.outputs.test_matrix_include }}
      version: ${{ steps.matrix.outputs.version }}
    steps:
      - name: Generate matrix
        id: matrix
        run: |
          echo input_pgversions="${{ inputs.pgversions }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PGVERSIONS="${{ inputs.pgversions }}"
            echo "Using workflow_dispatch pgversions: $PGVERSIONS"
          else
            PGVERSIONS="pg18,pg17,pg16,pg15,pg14"
            echo "Using default pgversions: $PGVERSIONS"
          fi


          # Create JSON array of objects for matrix.include
          MATRIX_JSON="["
          for PG in $(echo $PGVERSIONS | tr ',' ' '); do
            VERSION=${PG#pg}
            MATRIX_JSON+="{\"pgver\": \"$PG\", \"VERSION\": \"$VERSION\", \"distro\": \"bookworm\"},"
            MATRIX_JSON+="{\"pgver\": \"$PG\", \"VERSION\": \"$VERSION\", \"distro\": \"trixie\"},"
          done
          # Remove trailing comma and close array
          MATRIX_JSON=${MATRIX_JSON%,}
          MATRIX_JSON+="]"

          echo "matrix_include=$MATRIX_JSON" >> $GITHUB_OUTPUT

          # Create JSON array for test matrix (pgver x distro x runs_on)
          TEST_MATRIX_JSON="["
          for ARCH in "ubuntu-latest" "ubuntu-24.04-arm"; do
            for PG in $(echo $PGVERSIONS | tr ',' ' '); do
              VERSION=${PG#pg}
              TEST_MATRIX_JSON+="{\"pgver\": \"$PG\", \"VERSION\": \"$VERSION\", \"distro\": \"bookworm\", \"runs_on\": \"$ARCH\"},"
              TEST_MATRIX_JSON+="{\"pgver\": \"$PG\", \"VERSION\": \"$VERSION\", \"distro\": \"trixie\", \"runs_on\": \"$ARCH\"},"
            done
          done
          TEST_MATRIX_JSON=${TEST_MATRIX_JSON%,}
          TEST_MATRIX_JSON+="]"
          echo "test_matrix_include=$TEST_MATRIX_JSON" >> $GITHUB_OUTPUT

  oci-image-test:
    needs: setup-matrix
    strategy:
      matrix:
        include: ${{ fromJSON(needs.setup-matrix.outputs.test_matrix_include) }}
      fail-fast: false
    name: "${{ matrix.pgver }}-${{ matrix.distro }}-oci-test-on-${{ matrix.runs_on }}"
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: test oci image
        uses: ./.github/actions/build-oci-test
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          distro: ${{ matrix.distro }}
          ocipgversion: ${{ matrix.pgver }}

  oci-image-build:
    needs: [setup-matrix, oci-image-test]
    if: github.event_name == 'workflow_run' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        include: ${{ fromJSON(needs.setup-matrix.outputs.matrix_include) }}
      fail-fast: false
    name: "${{ matrix.pgver }}-${{ matrix.distro }}-oci-build"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: build oci image
        uses: ./.github/actions/build-oci-make
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          distro: ${{ matrix.distro }}
          ocipgversion: ${{ matrix.pgver }}

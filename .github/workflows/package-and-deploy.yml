# as main is protected, you can't commit into without a PR.
# So in main only validated PR are accepted.
# So build and test were run during the merge request process.
# So don't need to run twice the build and test workflow when releasing...
#
# Note: PGXN publishing is handled by a separate workflow (pgxn-publish.yml)
# which automatically triggers when a release is published.

name: "Package and deploy pglinter."

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "README.md"
      - "mkdocs.yml"

  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 0.0.17)"
        required: true
        type: string
      pgversions:
        description: "PostgreSQL versions to build (comma-separated: pg14,pg15,pg16,pg17,pg18)"
        required: false
        default: "pg17"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ##
  ## D Y N A M I C   M A T R I X   G E N E R A T I O N
  ##
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      pgversions: ${{ steps.matrix.outputs.pgversions }}
      runs_on: ${{ steps.matrix.outputs.runs_on }}
      arch: ${{ steps.matrix.outputs.arch }}
      pkgtype: ${{ steps.matrix.outputs.pkgtype }}
      matrix_include: ${{ steps.matrix.outputs.matrix_include }}
      matrix_include_amd64: ${{ steps.matrix.outputs.matrix_include_amd64 }}
      matrix_include_arm64: ${{ steps.matrix.outputs.matrix_include_arm64 }}
      version: ${{ steps.matrix.outputs.version }}
    steps:
      - name: Generate matrix
        id: matrix
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PGVERSIONS="${{ inputs.pgversions }}"
            echo "Using workflow_dispatch pgversions: $PGVERSIONS"
          else
            PGVERSIONS="pg14,pg15,pg16,pg17,pg18"
            echo "Using default pgversions: $PGVERSIONS"
          fi

          # Create JSON arrays of objects for matrix.include (all, amd64-only, arm64-only)
          MATRIX_JSON="["
          MATRIX_AMD64_JSON="["
          MATRIX_ARM64_JSON="["
          for PG in $(echo $PGVERSIONS | tr ',' ' '); do
            VERSION=${PG#pg}
            MATRIX_JSON+="{\"pgver\": \"$PG\", \"VERSION\": \"$VERSION\", \"arch\": \"amd64\", \"runs_on\": \"ubuntu-latest\", \"pkgtype\": \"deb\"},"
            MATRIX_JSON+="{\"pgver\": \"$PG\", \"VERSION\": \"$VERSION\", \"arch\": \"amd64\", \"runs_on\": \"ubuntu-latest\", \"pkgtype\": \"rpm\"},"
            MATRIX_JSON+="{\"pgver\": \"$PG\", \"VERSION\": \"$VERSION\", \"arch\": \"arm64\", \"runs_on\": \"ubuntu-24.04-arm\", \"pkgtype\": \"deb\"},"
            MATRIX_JSON+="{\"pgver\": \"$PG\", \"VERSION\": \"$VERSION\", \"arch\": \"arm64\", \"runs_on\": \"ubuntu-24.04-arm\", \"pkgtype\": \"rpm\"},"
            MATRIX_AMD64_JSON+="{\"pgver\": \"$PG\", \"VERSION\": \"$VERSION\", \"arch\": \"amd64\", \"runs_on\": \"ubuntu-latest\", \"pkgtype\": \"deb\"},"
            MATRIX_AMD64_JSON+="{\"pgver\": \"$PG\", \"VERSION\": \"$VERSION\", \"arch\": \"amd64\", \"runs_on\": \"ubuntu-latest\", \"pkgtype\": \"rpm\"},"
            MATRIX_ARM64_JSON+="{\"pgver\": \"$PG\", \"VERSION\": \"$VERSION\", \"arch\": \"arm64\", \"runs_on\": \"ubuntu-24.04-arm\", \"pkgtype\": \"deb\"},"
            MATRIX_ARM64_JSON+="{\"pgver\": \"$PG\", \"VERSION\": \"$VERSION\", \"arch\": \"arm64\", \"runs_on\": \"ubuntu-24.04-arm\", \"pkgtype\": \"rpm\"},"
          done
          # Remove trailing commas and close arrays
          MATRIX_JSON=${MATRIX_JSON%,}
          MATRIX_JSON+="]"
          MATRIX_AMD64_JSON=${MATRIX_AMD64_JSON%,}
          MATRIX_AMD64_JSON+="]"
          MATRIX_ARM64_JSON=${MATRIX_ARM64_JSON%,}
          MATRIX_ARM64_JSON+="]"

          echo "matrix_include=$MATRIX_JSON" >> $GITHUB_OUTPUT
          echo "matrix_include_amd64=$MATRIX_AMD64_JSON" >> $GITHUB_OUTPUT
          echo "matrix_include_arm64=$MATRIX_ARM64_JSON" >> $GITHUB_OUTPUT

  build-package-amd64:
    needs: setup-matrix
    strategy:
      matrix:
        include: ${{ fromJSON(needs.setup-matrix.outputs.matrix_include_amd64) }}
      fail-fast: false
    name: "${{ matrix.pgver }}-${{ matrix.arch }}-${{ matrix.pkgtype}}-package-build"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/pmpetit/postgresql_pglinter:latest-amd64
      options: --user root
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GH_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: create package
        uses: ./.github/actions/reusable-package-action
        with:
          pgver: ${{ matrix.pgver }}
          tag: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          arch: ${{ matrix.arch }}
          pkgtype: ${{ matrix.pkgtype }}

  build-package-arm64:
    needs: setup-matrix
    strategy:
      matrix:
        include: ${{ fromJSON(needs.setup-matrix.outputs.matrix_include_arm64) }}
      fail-fast: false
    name: "${{ matrix.pgver }}-${{ matrix.arch }}-${{ matrix.pkgtype}}-package-build"
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: create package
        uses: ./.github/actions/reusable-package-action-native
        with:
          pgver: ${{ matrix.pgver }}
          tag: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          arch: ${{ matrix.arch }}
          pkgtype: ${{ matrix.pkgtype }}

  test-package:
    needs:
      - setup-matrix
      - build-package-amd64
      - build-package-arm64
    strategy:
      matrix:
        include: ${{ fromJSON(needs.setup-matrix.outputs.matrix_include) }}
      fail-fast: false
    name: "${{ matrix.pgver }}-${{ matrix.arch }}-${{ matrix.pkgtype }}-package-test"
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Test deb package
        if: ${{ matrix.pkgtype == 'deb' }}
        uses: ./.github/actions/reusable-test-deb-package
        with:
          pg_version: ${{ matrix.version }}
          pglinter_version: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          platform: ${{ matrix.arch == 'amd64' && 'linux/amd64' || 'linux/arm64' }}
          timeout: "180"
      - name: Test rpm package
        if: ${{ matrix.pkgtype == 'rpm' }}
        uses: ./.github/actions/reusable-test-nodeb-package
        with:
          pg_version: ${{ matrix.version }}
          pglinter_version: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          platform: ${{ matrix.arch == 'amd64' && 'linux/amd64' || 'linux/arm64' }}
          timeout: "180"

  create-release:
    needs: test-package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Create Release Action
        if: success()
        uses: ./.github/actions/reusable-release-action
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}

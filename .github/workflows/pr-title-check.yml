name: "PR Title Validation"

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "README.md"

permissions:
  pull-requests: write
  statuses: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          requireScope: false

      - uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        if: always() && failure()
        with:
          header: pr-title-lint-error
          message: |
            👋 Hi! Your PR title doesn't follow our [Conventional Commits](https://www.conventionalcommits.org/) format.

            Please update your PR title to match this pattern:
            ```
            type(scope): description
            ```

            Examples:
            - `feat: add new linting rule`
            - `fix(docs): correct typo in README`
            - `refactor(core): improve error handling`

      - uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        if: success()
        with:
          header: pr-title-lint-error
          delete: true
